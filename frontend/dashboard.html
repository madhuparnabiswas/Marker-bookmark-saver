<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Marker</title>
  <link rel="stylesheet" href="styles-dashboard.css" />
</head>

<body>

  <div class="header">
      <h1 class="logo">Marker.</h1>
      <button class="profile-btn"></button>
  </div>

  <div class="greeting">
    <h2>Hello!</h2>
  </div>

  <div class="new">
    <p>Explore your bookmarks here.</p>
    <div class="new-buttons">
      <button class="favs-btn">#</button>
      <button id="open_modal" class="new-btn">New</button>
    </div>
    
  </div>

  <div id="bookmark-list"></div>

  <div id="no_data" class="no-data">
    <p>No bookmarks yet.</p>
  </div>

  <div id="confirm-modal" class="confirm-modal">
    <div class="confirm-box">
      <p>Are you sure you want to delete this bookmark?</p>
      
      <div class="confirm-actions">
        <button id="cancel-delete">Cancel</button>
        <button id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>



  <div id="modal_container" class="modal-container">
    <div class="modal">
      <h2 id="modal-title">New Bookmark</h2>
      <input id="title" type="text" placeholder="Title">
      <input id="url" type="text" placeholder="URL">
      <div class="button-row">
        <button id="close_modal" class="done-btn" disabled>Done</button>        
      </div>
    </div>
  </div>

<script src="dashboard.js" defer></script>
</body>

</html>
